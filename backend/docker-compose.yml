services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-card-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=mysql_password
      - DB_NAME=memory_card
      - DB_PORT=3306
      - PORT=3000
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_ACCESS_TOKEN=${TWITCH_ACCESS_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memory-card-network

  db:
    image: mysql:8
    container_name: memory-card-db
    environment:
      MYSQL_ROOT_PASSWORD: mysql_password
      MYSQL_DATABASE: memory_card
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memory-card-network

volumes:
  mysql_data:

networks:
  memory-card-network:
    driver: bridge
